<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>SIS Access</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, #111, #000);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CARD */
    .sis-card {
      width: 340px;
      padding: 30px;
      border-radius: 20px;

      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);

      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);

      text-align: center;
      color: white;

      transition: transform 0.2s ease;
    }

    /* TITLE */
    .sis-card h2 {
      margin-bottom: 20px;
    }

    /* INPUT */
    .sis-card input {
      width: 100%;
      padding: 7px;
      padding-left: -1px;
      margin-bottom: 15px;

      border-radius: 10px;
      border: none;

      background: rgba(255, 255, 255, 0.1);
      color: white;
      outline: none;
      text-align: center;
    }

    /* BUTTON GROUP */
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    /* BUTTON */
    .sis-card button {
      flex: 1;
      padding: 10px;

      border-radius: 10px;
      border: none;

      background: white;
      color: black;

      cursor: pointer;
      transition: 0.2s;
    }

    .sis-card button:hover {
      transform: scale(1.05);
    }

    /* RESULT */
    #result {
      margin-top: 12px;
      color: #2997ff;
      font-weight: 500;
    }

    /* TICK ICON */
    .tick {
      display: none;
      font-size: 20px;
      color: #2997ff;
      margin-top: 10px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from {
        transform: scale(0);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

    // GET PASSWORD
    function getPassword() {
      const usn = document.getElementById("usn").value.trim().toUpperCase();

      if (students[usn]) {
        document.getElementById("result").innerText = students[usn];
      } else {
        document.getElementById("result").innerText = "USN not found";
      }
    }

    // COPY WITH TICK
    function copyPassword() {
      const text = document.getElementById("result").innerText;

      if (text && text !== "USN not found") {
        navigator.clipboard.writeText(text);

        const tick = document.getElementById("tick");
        tick.style.display = "block";

        setTimeout(() => {
          tick.style.display = "none";
        }, 1000);
      }
    }

    // 3D EFFECT
    const card = document.getElementById("card");

    card.addEventListener("mousemove", (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const rotateX = -(y / rect.height - 0.5) * 10;
      const rotateY = (x / rect.width - 0.5) * 10;

      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    card.addEventListener("mouseleave", () => {
      card.style.transform = "rotateX(0) rotateY(0)";
    });
